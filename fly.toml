app = 'news-chat-server'
primary_region = 'iad'

[build]

[env]
  CHAT_SERVER_PORT = '3001'
  CHAT_RATE_LIMIT_MAX = '10'
  CHAT_RATE_LIMIT_WINDOW_MS = '10000'
  CHAT_MESSAGE_MAX_LENGTH = '5000'
  AI_MODERATION_TIMEOUT_MS = '8000'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
